name: 'Packages Split'

on:
  push:
    branches: [main]

jobs:
  packages_split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: danharrin/monorepo-split-github-action@v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          package_directory: 'packages/child'
          repository_organization: 'nikophil'
          repository_name: 'test-subtree-child'
          user_name: 'nikophil'
          user_email: 'nicolas.philippe@mapado.com'
          branch: 'main'
